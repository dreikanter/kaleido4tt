<!DOCTYPE html>
<html>
<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>
</head>
<body>
  <script>
    const CANVAS_SIZE = 1000;
    const QUADRANT_SIZE = CANVAS_SIZE / 2;

    function setup() {
      createCanvas(CANVAS_SIZE, CANVAS_SIZE);
      drawEverything();
    }

    function drawEverything() {
      const colors = generateColorPalette();

      // background(random(colors));
      noStroke();

      fillUpperRightTriangle(colors);
      mirrorOriginalTriangle();
      mirrorBottomRightQuadrantToLeft();
      mirrorBottomToTop();
      drawOutline();
    }

    function generateColorPalette() {
      colorMode(HSB, 360, 100, 100);
      const colors = [];
      const baseHue = random(360);

      for (let i = 0; i < 5; i++) {
        const hue = (baseHue + i * 72) % 360;
        colors.push(color(hue, random(60, 85), random(70, 90)));
      }

      return colors;
    }

    function fillUpperRightTriangle(colors) {
      const fillColor = random(colors);

      for (let x = QUADRANT_SIZE; x < CANVAS_SIZE; x++) {
        for (let y = QUADRANT_SIZE; y < QUADRANT_SIZE + (x - QUADRANT_SIZE) + 1; y++) {
          set(x, y, fillColor);
        }
      }

      updatePixels();

      drawTextInTriangle(colors.filter(color => color != fillColor));
    }

    function drawTextInTriangle(colors) {
      fill(random(colors));
      textAlign(CENTER, CENTER);
      textSize(56);
      textStyle(BOLD);

      const textX = QUADRANT_SIZE + QUADRANT_SIZE * 0.7;
      const textY = QUADRANT_SIZE + QUADRANT_SIZE * 0.3;

      text("Hola! 👋", textX, textY);
    }

    function mirrorOriginalTriangle() {
      loadPixels(); // Load current pixel state

      for (let x = QUADRANT_SIZE; x < CANVAS_SIZE; x++) {
        for (let y = QUADRANT_SIZE; y < QUADRANT_SIZE + (x - QUADRANT_SIZE); y++) {
          const pixelColor = get(x, y);

          const relativeX = x - QUADRANT_SIZE;
          const relativeY = y - QUADRANT_SIZE;
          const mirrorX = QUADRANT_SIZE + relativeY;
          const mirrorY = QUADRANT_SIZE + relativeX;

          // Only write to lower-left triangle (below diagonal)
          if (mirrorY > QUADRANT_SIZE + (mirrorX - QUADRANT_SIZE)) {
            set(mirrorX, mirrorY, pixelColor);
          }
        }
      }

      updatePixels();
    }

    function mirrorBottomRightQuadrantToLeft() {
      let bottomRightQuadrant = get(QUADRANT_SIZE, QUADRANT_SIZE, QUADRANT_SIZE, QUADRANT_SIZE);

      push();
      translate(QUADRANT_SIZE, QUADRANT_SIZE);
      scale(-1, 1);
      image(bottomRightQuadrant, 0, 0);
      pop();
    }

    function mirrorBottomToTop() {
      const bottomHalf = get(0, QUADRANT_SIZE, CANVAS_SIZE, QUADRANT_SIZE);

      push();
      translate(0, QUADRANT_SIZE);
      scale(1, -1);
      image(bottomHalf, 0, 0);
      pop();
    }

    function drawOutline() {
      stroke(255, 200);
      strokeWeight(2);
      noFill();

      triangle(
        QUADRANT_SIZE, QUADRANT_SIZE,
        CANVAS_SIZE + 1, QUADRANT_SIZE,
        CANVAS_SIZE + 1, CANVAS_SIZE + 1
      );
    }

    function mousePressed() {
      drawEverything();
    }
  </script>
</body>
</html>
