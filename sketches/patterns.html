<!DOCTYPE html>
<html>
<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>
</head>
<body>
  <script>
    const CANVAS_SIZE = 1000;
    const QUADRANT_SIZE = CANVAS_SIZE / 2;

    function setup() {
      createCanvas(CANVAS_SIZE, CANVAS_SIZE);

      background(50); // Dark gray background
      noStroke();

      fillBottomRightQuadrant();
      mirrorOriginalTriangle();
      mirrorBottomRightQuadrantToLeft();
      mirrorBottomToTop();
      drawOutline();
    }

    function fillBottomRightQuadrant() {
      // Fill entire bottom-right quadrant with solid blue color
      fill(100, 150, 255);
      rect(QUADRANT_SIZE, QUADRANT_SIZE, QUADRANT_SIZE, QUADRANT_SIZE);
    }

    function mirrorOriginalTriangle() {
      // Copy the pixels from the triangle and place them in mirror position
      for (let x = QUADRANT_SIZE; x < CANVAS_SIZE; x++) {
        for (let y = QUADRANT_SIZE; y < CANVAS_SIZE; y++) {
          // Check if we're in the original triangle
          if (y <= QUADRANT_SIZE + (x - QUADRANT_SIZE)) {
            // Get pixel color from original triangle
            let pixelColor = get(x, y);

            // Calculate mirror position across diagonal
            let mirrorX = QUADRANT_SIZE + (y - QUADRANT_SIZE);
            let mirrorY = QUADRANT_SIZE + (x - QUADRANT_SIZE);

            // Set the mirrored pixel
            if (mirrorX >= 0 && mirrorX < CANVAS_SIZE && mirrorY >= 0 && mirrorY < CANVAS_SIZE) {
              set(mirrorX, mirrorY, pixelColor);
            }
          }
        }
      }
      updatePixels();
    }

    function mirrorBottomRightQuadrantToLeft() {
      // Get the bottom-right quadrant
      let bottomRightQuadrant = get(QUADRANT_SIZE, QUADRANT_SIZE, QUADRANT_SIZE, QUADRANT_SIZE);

      // Mirror it to bottom-left quadrant
      push();
      translate(QUADRANT_SIZE, QUADRANT_SIZE);
      scale(-1, 1); // Flip horizontally
      image(bottomRightQuadrant, 0, 0);
      pop();
    }

    function mirrorBottomToTop() {
      // Get the bottom half of the canvas
      let bottomHalf = get(0, QUADRANT_SIZE, CANVAS_SIZE, QUADRANT_SIZE);

      // Mirror it to top half
      push();
      translate(0, QUADRANT_SIZE);
      scale(1, -1); // Flip vertically
      image(bottomHalf, 0, 0);
      pop();
    }

    function drawOutline() {
      // Show only the original triangle outline
      stroke(255, 200);
      strokeWeight(2);
      noFill();
      triangle(QUADRANT_SIZE, QUADRANT_SIZE, CANVAS_SIZE, QUADRANT_SIZE, CANVAS_SIZE, CANVAS_SIZE);
    }
  </script>
</body>
</html>
