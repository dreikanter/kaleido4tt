<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://unpkg.com/modern-normalize/modern-normalize.css">
  <link rel="stylesheet" href="https://unpkg.com/tachyons/css/tachyons.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>
</head>
<body class="pa4">
  <script>
    let objects = [];
    let backgroundColor;
    let renderTime = 0;

    const SHAPE_COUNT = 12000;
    const MIN_SIZE = 10;
    const MAX_SIZE = 150;
    const MIN_ALPHA = 200;
    const MIN_COLOR = 50;
    const MAX_COLOR = 255;
    const CANVAS_SIZE = 800;
    const TRANSLATE_OFFSET = 200;

    function setup() {
      backgroundColor = color(random(MIN_COLOR, MAX_COLOR), random(MIN_COLOR, MAX_COLOR), random(MIN_COLOR, MAX_COLOR));
      createCanvas(CANVAS_SIZE, CANVAS_SIZE);

      background(backgroundColor);
      noStroke();
      translate(TRANSLATE_OFFSET, TRANSLATE_OFFSET);

      const startTime = millis();
      drawShapeArray(this);
      renderTime = millis() - startTime;
      updateRefreshText();
    }

    function generateRandomShape() {
      const x = random(-TRANSLATE_OFFSET - MAX_SIZE, CANVAS_SIZE - MAX_SIZE);
      const y = random(-TRANSLATE_OFFSET - MAX_SIZE, CANVAS_SIZE - MAX_SIZE);
      const x2 = random(random(4) % 2 == 1 ? x + random(MAX_SIZE/4) : x - random(MAX_SIZE/4));
      const y2 = random(random(4) % 2 == 1 ? y + random(MAX_SIZE/4) : y - random(MAX_SIZE/4));
      const x3 = random(random(4) % 2 == 1 ? x + random(MAX_SIZE/4) : x - random(MAX_SIZE/4));
      const y3 = random(random(4) % 2 == 1 ? y + random(MAX_SIZE/4) : y - random(MAX_SIZE/4));

      const width = int(random(MIN_SIZE, MAX_SIZE));
      const height = int(random(MIN_SIZE, MAX_SIZE));
      const red = random(MIN_COLOR, MAX_COLOR);
      const green = random(MIN_COLOR, MAX_COLOR);
      const blue = random(MIN_COLOR, MAX_COLOR);
      let shapeColor = color(red, green, blue, random(MIN_ALPHA, 255));
      if (shapeColor == backgroundColor) shapeColor = color(red, green, blue, random(MIN_ALPHA, 255));
      const shapeType = int(random(0, 5));
      const angle = int(random(0, 90));
      return [x, y, width, height, shapeColor, shapeType, angle, x2, y2, x3, y3];
    }

    function drawShapeArray(buffer) {
      for (let i = 0; i < SHAPE_COUNT; i++) {
        if (objects.length < SHAPE_COUNT) {
          const newShape = generateRandomShape();
          objects.push(newShape);
        }
        drawPrimitive(buffer, objects[i]);
      }
    }

    function drawPrimitive(buffer, primitive) {
      buffer.fill(primitive[4]);
      buffer.rotate(-primitive[6]);
      switch (primitive[5]) {
        case 0: buffer.square(primitive[0], primitive[1], primitive[2]/4); break;
        case 1: buffer.rect(primitive[0], primitive[1], primitive[2]/2, primitive[3]); break;
        case 2: buffer.circle(primitive[0], primitive[1], primitive[2]/4); break;
        case 3: buffer.ellipse(primitive[0], primitive[1], primitive[2]/2, primitive[3]/2); break;
        case 4: buffer.triangle(primitive[0], primitive[1], primitive[7], primitive[8], primitive[9], primitive[10]); break;
        default: buffer.line(primitive[0], primitive[1], primitive[2], primitive[3]);
      }
      buffer.rotate(primitive[6]);
    }

    function updateRefreshText() {
      const refreshDiv = document.getElementById('refresh-text');
      refreshDiv.textContent = `Click to refresh (last render: ${renderTime}ms)`;
    }

    function mousePressed() {
      objects = [];
      backgroundColor = color(random(MIN_COLOR, MAX_COLOR), random(MIN_COLOR, MAX_COLOR), random(MIN_COLOR, MAX_COLOR));
      background(backgroundColor);
      push();
      translate(TRANSLATE_OFFSET, TRANSLATE_OFFSET);
      const startTime = millis();
      drawShapeArray(this);
      renderTime = millis() - startTime;
      pop();
      updateRefreshText();
    }
  </script>
  <div class="sans-serif mb3" id="refresh-text">Click to refresh</div>
</body>
</html>
